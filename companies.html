<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn - Companies</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-twocol.css">
    <link rel="stylesheet" href="styles-twocol-dx.css">
    <link rel="stylesheet" href="styles-users-dx.css">
    <link rel="stylesheet" href="styles-users-twocol-dx.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.6/css/dx.light.css">
    <script>
        // Pre-register DevExtreme trial-banner custom elements as no-ops so the
        // library's own registration is skipped and the orange banner never appears.
        customElements.define('dx-license', class extends HTMLElement {});
        customElements.define('dx-license-trigger', class extends HTMLElement {});
    </script>
    <script src="https://cdn3.devexpress.com/jslib/24.2.6/js/dx.all.js"></script>
</head>
<body class="view-accordion">
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <button type="button" class="scope-card" id="scopePicker" aria-label="Change workspace">
                <div class="scope-card-logo" hidden></div>
                <div class="scope-card-text">
                    <div class="scope-card-company" id="scopePickerCompany">Select company</div>
                    <div class="scope-card-dept" id="scopePickerDept"></div>
                </div>
                <div class="scope-card-arrows">
                    <i class="fas fa-angle-up"></i>
                    <i class="fas fa-angle-down"></i>
                </div>
                <div class="scope-card-credits" id="scopeCredits" hidden></div>
            </button>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index-topics.html" class="nav-item" data-tooltip="Topics"><i class="fas fa-layer-group"></i><span>Topics</span></a>
                    <a href="index-topics-v2.html" class="nav-item" data-tooltip="Topics v2"><i class="fas fa-layer-group"></i><span>Topics v2</span></a>
                    <a href="index-games.html" class="nav-item" data-tooltip="Games"><i class="fas fa-trophy"></i><span>Games</span></a>
                    <a href="#" class="nav-item" data-tooltip="Game Calendar"><i class="fas fa-calendar-alt"></i><span>Game Calendar</span></a>
                    <a href="#" class="nav-item" data-tooltip="Rewards"><i class="fas fa-medal"></i><span>Rewards</span></a>
                    <a href="index-users-dept-grid.html" class="nav-item" data-tooltip="Users"><i class="fas fa-users"></i><span>Users</span></a>
                    <a href="reports.html" class="nav-item" data-tooltip="Reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
                </div>
                <div class="nav-section nav-section-admin">
                    <div class="nav-section-label">Admin</div>
                    <a href="companies.html" class="nav-item active" data-tooltip="Companies"><i class="fas fa-building"></i><span>Companies</span></a>
                    <a href="#" class="nav-item" data-tooltip="User Access"><i class="fas fa-user-shield"></i><span>User Access</span></a>
                    <a href="#" class="nav-item" data-tooltip="Audit Logs"><i class="fas fa-clipboard-list"></i><span>Audit Logs</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item" data-tooltip="Logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Companies</h1>
                <div class="page-actions">
                    <button class="btn btn-outline" onclick="exportList()"><i class="fas fa-file-export"></i> Export List</button>
                    <button class="btn btn-outline" onclick="addCompany()"><i class="fas fa-building"></i> Add Company</button>
                    <button class="btn btn-primary" onclick="addDepartment()"><i class="fas fa-sitemap"></i> Add Department</button>
                </div>
            </div>

            <!-- List toolbar (search top-left of the list) -->
            <div class="list-toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search..." id="tableSearch" oninput="filterTable(this.value)">
                </div>
            </div>

            <div class="table-container" id="companiesTable">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-name">Name</th>
                        </tr>
                    </thead>
                    <tbody><!-- rendered by renderCompaniesTable() --></tbody>
                </table>
            </div>
        </main>

        <aside class="detail-panel" id="detailPanel">
            <div class="detail-empty" id="detailEmpty">
                <i class="fas fa-mouse-pointer"></i>
                <p>Click a department to view details</p>
            </div>

            <div class="detail-content hidden" id="detailEdit">
                <div class="detail-topbar">
                    <span class="detail-edit-badge" id="editBadge"><i class="fas fa-pen"></i> Editing</span>
                    <button class="btn-icon" onclick="closeDetail()" title="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-header">
                    <h3 id="editTitle">Edit Department</h3>
                    <span class="detail-parent" id="editSubtitle"></span>
                </div>
                <div id="editFormContainer"></div>
                <div class="edit-actions">
                    <div id="editDeleteBtn"></div>
                    <div id="editCancelBtn"></div>
                    <div id="editSaveBtn"></div>
                </div>
            </div>
        </aside>
    </div>

    <div id="deleteConfirm"></div>
    <div id="toastNotify"></div>

    <script src="script-twocol-dx.js"></script>
    <script src="script-sidebar-scope.js"></script>
</body>
</html>
