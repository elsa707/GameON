<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn - Questions v2</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-topics.css">
    <link rel="stylesheet" href="styles-games.css">
    <link rel="stylesheet" href="styles-questions.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.6/css/dx.light.css">
    <script>
        customElements.define('dx-license', class extends HTMLElement {});
        customElements.define('dx-license-trigger', class extends HTMLElement {});
    </script>
    <script src="https://cdn3.devexpress.com/jslib/24.2.6/js/dx.all.js"></script>
</head>
<body class="view-accordion">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <button type="button" class="scope-card" id="scopePicker" aria-label="Change workspace">
                <div class="scope-card-logo" hidden></div>
                <div class="scope-card-text">
                    <div class="scope-card-company" id="scopePickerCompany">Select company</div>
                    <div class="scope-card-dept" id="scopePickerDept"></div>
                </div>
                <div class="scope-card-arrows">
                    <i class="fas fa-angle-up"></i>
                    <i class="fas fa-angle-down"></i>
                </div>
                <div class="scope-card-credits" id="scopeCredits" hidden></div>
            </button>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index-topics.html" class="nav-item" data-tooltip="Topics"><i class="fas fa-layer-group"></i><span>Topics</span></a>
                    <a href="index-topics-v2.html" class="nav-item" data-tooltip="Topics v2"><i class="fas fa-layer-group"></i><span>Topics v2</span></a>
                    <a href="index-games.html" class="nav-item" data-tooltip="Games"><i class="fas fa-trophy"></i><span>Games</span></a>
                    <a href="index-games-v2.html" class="nav-item active" data-tooltip="Games v2"><i class="fas fa-trophy"></i><span>Games v2</span></a>
                    <a href="#" class="nav-item" data-tooltip="Game Calendar"><i class="fas fa-calendar-alt"></i><span>Game Calendar</span></a>
                    <a href="#" class="nav-item" data-tooltip="Rewards"><i class="fas fa-medal"></i><span>Rewards</span></a>
                    <a href="index-users-dept-grid.html" class="nav-item" data-tooltip="Users"><i class="fas fa-users"></i><span>Users</span></a>
                    <a href="reports.html" class="nav-item" data-tooltip="Reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
                </div>
                <div class="nav-section nav-section-admin">
                    <div class="nav-section-label">Admin</div>
                    <a href="companies.html" class="nav-item" data-tooltip="Companies"><i class="fas fa-building"></i><span>Companies</span></a>
                    <a href="#" class="nav-item" data-tooltip="User Access"><i class="fas fa-user-shield"></i><span>User Access</span></a>
                    <a href="#" class="nav-item" data-tooltip="Audit Logs"><i class="fas fa-clipboard-list"></i><span>Audit Logs</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item" data-tooltip="Logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Page Header -->
            <div class="page-header">
                <div class="page-title-group">
                    <div class="page-title-row">
                        <a href="index-games-v2.html" class="page-back-btn" id="questionsBackBtn" title="Back to Games v2"><i class="fas fa-arrow-left"></i></a>
                        <h1>Questions</h1>
                    </div>
                    <p class="page-subtitle" id="questionsSubtitle"></p>
                </div>
                <div class="page-actions" id="questionsHeaderActions">
                    <button class="btn btn-outline" id="importExcelBtn"><i class="fas fa-upload"></i> Import from Excel</button>
                    <button class="btn btn-primary" onclick="openAddQuestion()"><i class="fas fa-plus"></i> Add Question</button>
                </div>
            </div>

            <!-- Warning banner (< 5 questions) -->
            <div class="questions-warning" id="questionsWarning" hidden>
                <i class="fas fa-circle-exclamation"></i>
                At least 5 questions are required before this category can be used in a game.
            </div>

            <!-- Done button — inline, right-aligned, below the list -->
            <div class=”questions-done-bar” id=”questionsDoneBar” hidden>
                <button class="btn" onclick="goBackToGames()">Done</button>
            </div>
        </main>

        <!-- Detail Panel -->
        <aside class="detail-panel" id="detailPanel">
            <!-- Empty state -->
            <div class="detail-empty" id="detailEmpty">
                <i class="fas fa-mouse-pointer"></i>
                <p>Click <strong>+ Add Question</strong> to add a question</p>
            </div>

            <!-- Questions list (shown when at least one question exists) -->
            <div class="detail-content hidden" id="detailQuestionsList">
                <div id="questionsList"></div>
            </div>

            <!-- Edit / Add mode -->
            <div class="detail-content hidden" id="detailEdit">
                <div class="detail-topbar">
                    <span class="detail-edit-badge" id="gameEditBadge"><i class="fas fa-plus"></i> Adding</span>
                    <button class="btn-icon" onclick="closeQPanel()" title="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-header">
                    <h3 id="gameEditTitle">Add Question</h3>
                    <span class="detail-parent" id="gameEditSubtitle"></span>
                </div>
                <form id="gameEditForm" class="edit-form" onsubmit="return false;">
                    <div id="gameEditFields"></div>
                    <div class="edit-actions" id="qEditActions">
                        <!-- populated by JS -->
                    </div>
                </form>
            </div>
        </aside>
    </div>

    <!-- Full-width green success toast -->
    <div class="questions-saved-toast" id="questionsSavedToast" hidden>
        <span class="questions-saved-toast-icon"><i class="fas fa-check"></i></span>
        Questions saved successfully.
    </div>

    <script src="games-data.js?v=1"></script>
    <script src="topics-data.js?v=1"></script>
    <script src="script-games.js?v=97"></script>
    <script src="script-questions.js?v=4"></script>
    <!-- Intent-first override â€” must load after both script-games.js and script-questions.js -->
    <script src="script-games-v2-intent.js?v=36"></script>
    <script src="script-games-sidebar-scope.js?v=1"></script>
    <script src="script-sidebar-scope.js"></script>
    <script>
        // Override goBackToGames so "Done" returns to the originating games page
        // and opens the share step for the game that was just set up.
        // returnTo defaults to 'index-games-v2.html' so the v2 flow is unchanged.
        window.goBackToGames = function () {
            var returnTo = 'index-games-v2.html';
            try {
                var nav = JSON.parse(localStorage.getItem('gameon.questionsNav') || '{}');
                if (nav.gameId) {
                    localStorage.setItem('gameon.pendingShare', JSON.stringify({ gameId: nav.gameId }));
                }
                if (nav.returnTo) returnTo = nav.returnTo;
            } catch (e) {}
            window.location.href = returnTo;
        };
    </script>
</body>
</html>
