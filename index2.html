<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn - Analytics Dashboard (v2 nav)</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-dashboard.css?v=55">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.6/css/dx.light.css">
    <script>
        customElements.define('dx-license', class extends HTMLElement {});
        customElements.define('dx-license-trigger', class extends HTMLElement {});
    </script>
    <script src="https://cdn3.devexpress.com/jslib/24.2.6/js/dx.all.js"></script>
</head>
<body>
<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar">
        <button type="button" class="scope-card" id="scopePicker" aria-label="Change workspace">
            <div class="scope-card-logo" hidden></div>
            <div class="scope-card-text">
                <div class="scope-card-company" id="scopePickerCompany">Select company</div>
                <div class="scope-card-dept" id="scopePickerDept"></div>
            </div>
            <div class="scope-card-arrows">
                <i class="fas fa-angle-up"></i>
                <i class="fas fa-angle-down"></i>
            </div>
            <div class="scope-card-credits" id="scopeCredits" hidden></div>
        </button>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <a href="index.html" class="nav-item active" data-tooltip="Dashboard"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="index-topics.html" class="nav-item" data-tooltip="Topics"><i class="fas fa-layer-group"></i><span>Topics</span></a>
                <a href="#" class="nav-item" data-tooltip="Games"><i class="fas fa-trophy"></i><span>Games</span></a>
                <a href="#" class="nav-item" data-tooltip="Game Calendar"><i class="fas fa-calendar-alt"></i><span>Game Calendar</span></a>
                <a href="#" class="nav-item" data-tooltip="Rewards"><i class="fas fa-medal"></i><span>Rewards</span></a>
                <a href="index-users-dept-grid.html" class="nav-item" data-tooltip="Players"><i class="fas fa-users"></i><span>Players</span></a>
                <div class="nav-group open" id="reportsNavGroup">
                    <a href="javascript:void(0)" class="nav-item" onclick="toggleReportsNav()" data-tooltip="Reports">
                        <i class="fas fa-chart-bar"></i><span>Reports</span>
                        <i class="fas fa-chevron-right nav-arrow"></i>
                    </a>
                    <div class="nav-sub">
                        <a href="javascript:void(0)" class="nav-sub-item active" data-tab="summary"       onclick="dashMainTab('summary')">Summary</a>
                        <a href="javascript:void(0)" class="nav-sub-item"        data-tab="players"       onclick="dashMainTab('players')">Players</a>
                        <a href="javascript:void(0)" class="nav-sub-item"        data-tab="games"         onclick="dashMainTab('games')">Games</a>
                        <a href="javascript:void(0)" class="nav-sub-item"        data-tab="departments"   onclick="dashMainTab('departments')">Departments</a>
                        <a href="javascript:void(0)" class="nav-sub-item"        data-tab="gamification"  onclick="dashMainTab('gamification')">Gamification</a>
                    </div>
                </div>
            </div>
            <div class="nav-section nav-section-admin">
                <div class="nav-section-label">Admin</div>
                <a href="companies.html" class="nav-item" data-tooltip="Companies"><i class="fas fa-building"></i><span>Companies</span></a>
                <a href="#" class="nav-item" data-tooltip="User Access"><i class="fas fa-user-shield"></i><span>User Access</span></a>
                <a href="#" class="nav-item" data-tooltip="Audit Logs"><i class="fas fa-clipboard-list"></i><span>Audit Logs</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" data-tooltip="Logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main">

        <!-- Dashboard header -->
        <div class="dash-hd">
            <h1 class="dash-hd-title">Analytics Dashboard</h1>
            <div class="dash-hd-right">
                <div class="dash-hd-stats">
                    <strong id="dashStatPlayers" hidden>17</strong>
                    <strong id="dashStatPlays" hidden>2.5K</strong>
                    <strong id="dashStatDealers" hidden>7</strong>
                </div>
                <div id="dashPdfBtn" class="dash-hd-dx-btn"></div>
            </div>
        </div>

        <!-- Period filter -->
        <div class="dash-period" id="dashPeriodBar">
            <div class="dash-period-pills">
                <button class="dash-period-pill" data-pill="thismonth"   onclick="dashPeriodPill('thismonth')">This month</button>
                <button class="dash-period-pill" data-pill="lastmonth"   onclick="dashPeriodPill('lastmonth')">Last month</button>
                <button class="dash-period-pill" data-pill="last3months" onclick="dashPeriodPill('last3months')">Last 3 months</button>
                <button class="dash-period-pill" data-pill="last6months" onclick="dashPeriodPill('last6months')">Last 6 months</button>
            </div>
            <div class="dash-period-divider"></div>
            <div id="dashPeriodMonths"></div>
            <div id="dashDateRangeBox"></div>
        </div>

        <!-- Two-column content grid -->
        <div class="dash-content-grid">
            <div class="dash-right-area">
                <div class="dash-subtabs-bar">
                    <div id="dashSubTabs"></div>
                </div>

                <div class="dash-body">

            <!-- SUMMARY panel: sub-tabs = Overview / Trends / Forecasts & anomalies -->
            <div class="dash-panel active" data-panel="summary">
                <div class="dash-sub-panel active" data-sub="overview"           id="dashSummaryOverview"></div>
                <div class="dash-sub-panel"        data-sub="trends"             id="dashSummaryTrends"></div>
                <div class="dash-sub-panel"        data-sub="forecastsanomalies" id="dashSummaryForecastAnomalies"></div>
            </div>

            <!-- PLAYERS panel: sub-tabs = Overview / Trends / Forecasts & anomalies -->
            <div class="dash-panel" data-panel="players">
                <div class="dash-sub-panel active" data-sub="overview"           id="dashPlayersPanel"></div>
                <div class="dash-sub-panel"        data-sub="trends"             id="dashPlayersTrends"></div>
                <div class="dash-sub-panel"        data-sub="forecastsanomalies" id="dashPlayersForecastAnomalies"></div>
            </div>

            <!-- GAMES panel: sub-tabs = Overview / Trends / Forecasts & anomalies -->
            <div class="dash-panel" data-panel="games">
                <div class="dash-sub-panel active" data-sub="overview"           id="dashGamesOverview"></div>
                <div class="dash-sub-panel"        data-sub="trends"             id="dashGamesTrends"></div>
                <div class="dash-sub-panel"        data-sub="forecastsanomalies" id="dashGamesAnomalies"></div>
            </div>

            <!-- DEPARTMENTS panel: sub-tabs = Overview / Trends / Forecasts & anomalies -->
            <div class="dash-panel" data-panel="departments">
                <div class="dash-sub-panel active" data-sub="overview"           id="dashDeptPanel"></div>
                <div class="dash-sub-panel"        data-sub="trends"             id="dashDeptTrends"></div>
                <div class="dash-sub-panel"        data-sub="forecastsanomalies" id="dashDeptForecastAnomalies"></div>
            </div>

            <!-- GAMIFICATION panel (unchanged) -->
            <div class="dash-panel" data-panel="gamification">
                <div class="dash-sub-panel active" data-sub="leagues"    id="dashGamLeagues"></div>
                <div class="dash-sub-panel"        data-sub="scoreboard" id="dashGamScoreboard"></div>
                <div class="dash-sub-panel"        data-sub="streaks"    id="dashGamStreaks"></div>
                <div class="dash-sub-panel"        data-sub="playdays"   id="dashGamPlayDays"></div>
            </div>

            <!-- Hidden stubs so render functions that look for index.html-only IDs don't error -->
            <div style="display:none" aria-hidden="true">
                <div id="dashRegionalOverview"></div>
                <div id="dashRegionalTrends"></div>
            </div>

                </div><!-- /.dash-body -->
            </div><!-- /.dash-right-area -->
        </div><!-- /.dash-content-grid -->

    </main>

</div><!-- /.layout -->

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
</script>
<script src="script-sidebar-scope.js"></script>
<script src="script-dashboard.js?v=110"></script>
<script src="script-dashboard2.js?v=5"></script>
</body>
</html>
