<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn - Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.6/css/dx.light.css">
    <script>
        // Pre-register DevExtreme trial-banner custom elements as no-ops so the
        // library's own registration is skipped and the orange banner never appears.
        customElements.define('dx-license', class extends HTMLElement {});
        customElements.define('dx-license-trigger', class extends HTMLElement {});
    </script>
    <script src="https://cdn3.devexpress.com/jslib/24.2.6/js/dx.all.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <button type="button" class="scope-card" id="scopePicker" aria-label="Change workspace">
                <div class="scope-card-logo" hidden></div>
                <div class="scope-card-text">
                    <div class="scope-card-company" id="scopePickerCompany">Select company</div>
                    <div class="scope-card-dept" id="scopePickerDept"></div>
                </div>
                <div class="scope-card-arrows">
                    <i class="fas fa-angle-up"></i>
                    <i class="fas fa-angle-down"></i>
                </div>
                <div class="scope-card-credits" id="scopeCredits" hidden></div>
            </button>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index-topics.html" class="nav-item" data-tooltip="Topics"><i class="fas fa-layer-group"></i><span>Topics</span></a>
                    <a href="index-topics-v2.html" class="nav-item" data-tooltip="Topics v2"><i class="fas fa-layer-group"></i><span>Topics v2</span></a>
                    <a href="#" class="nav-item" data-tooltip="Games"><i class="fas fa-trophy"></i><span>Games</span></a>
                    <a href="#" class="nav-item" data-tooltip="Game Calendar"><i class="fas fa-calendar-alt"></i><span>Game Calendar</span></a>
                    <a href="#" class="nav-item" data-tooltip="Rewards"><i class="fas fa-medal"></i><span>Rewards</span></a>
                    <a href="index-users-dept-grid.html" class="nav-item" data-tooltip="Users"><i class="fas fa-users"></i><span>Users</span></a>
                    <a href="reports.html" class="nav-item" data-tooltip="Reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
                </div>
                <div class="nav-section nav-section-admin">
                    <div class="nav-section-label">Admin</div>
                    <a href="companies.html" class="nav-item" data-tooltip="Companies"><i class="fas fa-building"></i><span>Companies</span></a>
                    <a href="#" class="nav-item" data-tooltip="User Access"><i class="fas fa-user-shield"></i><span>User Access</span></a>
                    <a href="#" class="nav-item" data-tooltip="Audit Logs"><i class="fas fa-clipboard-list"></i><span>Audit Logs</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item" data-tooltip="Logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Settings</h1>
            </div>

            <div class="placeholder-page">
                <div class="placeholder-card">
                    <i class="fas fa-cog placeholder-icon"></i>
                    <h2>Settings coming soon</h2>
                    <p>Manage configurations, integrations and account preferences here.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    </script>
    <script src="script-sidebar-scope.js"></script>
</body>
</html>
